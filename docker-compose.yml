version: '3.8'

services:
  # MongoDB数据库
  mongodb:
    image: mongo:7
    container_name: silentfall-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-silentfall}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-silentfall123}
      MONGO_INITDB_DATABASE: silentfall
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongodb/init:/docker-entrypoint-initdb.d
    networks:
      - silentfall-network

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: silentfall-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - silentfall-network
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端Java应用
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: silentfall-backend
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: docker
      TZ: Asia/Shanghai
      # MongoDB配置
      MONGODB_URI: mongodb://silentfall:${MONGO_ROOT_PASSWORD:-silentfall123}@mongodb:27017/silentfall?authSource=admin
      # Redis配置
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DATABASE: 0
      # JWT配置
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-jwt-secret-key-change-in-production}
      JWT_TTL: ${JWT_TTL:-86400000}
      # 本地存储配置
      LOCAL_STORAGE_PATH: /app/uploads
      # 邮件配置
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      # 访客验证码
      VISITOR_VERIFY_CODE: ${VISITOR_VERIFY_CODE}
      # 网站配置
      WEBSITE_TITLE: ${WEBSITE_TITLE}
      WEBSITE_HOME: ${WEBSITE_HOME}
      WEBSITE_ADMIN: ${WEBSITE_ADMIN}
      WEBSITE_BLOG: ${WEBSITE_BLOG}
    ports:
      - "5922:5922"
    networks:
      - silentfall-network
    depends_on:
      - mongodb
      redis:
        condition: service_healthy
    volumes:
      - ./docker/app/logs:/app/logs
      - ./docker/app/uploads:/app/uploads

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: silentfall-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    networks:
      - silentfall-network
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/sites-enabled:/etc/nginx/sites-enabled:ro
      - ./docker/html:/var/www:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mongodb_data:
  redis_data:
  nginx_logs:

networks:
  silentfall-network:
    driver: bridge
